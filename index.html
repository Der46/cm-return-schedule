<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CM回歸號排程表</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111823;
      --panel-2: #0f1520;
      --text: #f3f7ff;
      --muted: #c6d4e8;
      --line: #3a4b63;
      --sun: #ff6b7a;
      --focus: #7dd3fc;
      --radius: 14px;
      --cell-h: 130px;
      --week-h: 48px;
      --shadow: 0 8px 20px rgba(0, 0, 0, .35);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
      font-size: 18px;
      line-height: 1.6;
    }

    .app {
      max-width: 1320px;
      margin: 20px auto;
      padding: 0 16px 24px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: .3px;
      line-height: 1.3;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 2px solid var(--line);
      background: #172132;
      color: var(--text);
      min-height: 52px;
      padding: 0 16px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 800;
      font-size: 18px;
      box-shadow: var(--shadow);
    }

    .btn:hover {
      filter: brightness(1.08);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .month-label {
      min-width: 180px;
      text-align: center;
      font-weight: 800;
      color: #dbeafe;
      font-size: 22px;
      padding: 10px 8px;
    }

    .calendar-wrap {
      width: 100%;
      min-width: 0;
      border: 2px solid var(--line);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .weekdays {
      height: var(--week-h);
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-bottom: 2px solid var(--line);
      background: #131d2b;
      align-items: center;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
      color: var(--muted);
    }

    .weekdays .sun {
      color: var(--sun);
    }

    .grid {
      position: relative;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      grid-auto-rows: var(--cell-h);
    }

    .cell {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      position: relative;
      overflow: hidden;
    }

    .cell:nth-child(7n) {
      border-right: none;
    }

    .date {
      font-size: 22px;
      color: #d7e6fb;
      font-weight: 800;
      user-select: none;
    }

    .cell.other .date {
      color: #7f93b0;
    }

    .cell.sun .date {
      color: var(--sun);
    }

    .cell.today {
      background: linear-gradient(180deg, rgba(80, 130, 190, .28), rgba(80, 130, 190, .08));
      outline: 2px solid #7fb8ff;
      outline-offset: -2px;
    }

    .event-layer {
      pointer-events: none;
      position: absolute;
      inset: 0;
    }

    .event-bar {
      position: absolute;
      height: 26px;
      border-radius: 999px;
      color: #ffffff;
      font-size: 16px;
      font-weight: 800;
      line-height: 26px;
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      box-shadow: 0 3px 8px rgba(0, 0, 0, .28), inset 0 0 0 1px rgba(255, 255, 255, .14);
      pointer-events: auto;
    }

    .event-bar.c1-special {
      color: #fff;
      text-shadow: 0 1px 2px rgba(0, 0, 0, .55);
      box-shadow:
        0 0 0 1.5px rgba(255, 255, 255, .9),
        0 0 14px rgba(244, 63, 94, .45),
        0 3px 10px rgba(0, 0, 0, .35);
      background-image:
        repeating-linear-gradient(-45deg,
          rgba(255, 255, 255, .22) 0 8px,
          rgba(255, 255, 255, 0) 8px 16px),
        linear-gradient(90deg, #fbbf24 0%, #fb7185 48%, #c026d3 100%);
    }

    .legend {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 16px;
      align-items: center;
      color: #d0ddf0;
      font-size: 18px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #101a28;
      font-size: 16px;
      color: #e7f0ff;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease, border-color .12s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 3px 10px rgba(0, 0, 0, .25);
    }

    .chip.active {
      border-color: #93c5fd;
      box-shadow: inset 0 0 0 1px rgba(147, 197, 253, .35), 0 3px 10px rgba(0, 0, 0, .25);
    }

    .chip.inactive {
      opacity: .35;
      filter: grayscale(.2);
    }

    .chip:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .chip .name {
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      display: inline-block;
    }

    .info {
      margin-top: 12px;
      border: 2px solid var(--line);
      border-radius: 12px;
      background: #0f1622;
      padding: 12px 14px;
      color: #d0def3;
      font-size: 18px;
      line-height: 1.7;
    }

    .ok {
      color: #4ade80;
      font-weight: 800;
    }

    .warn {
      color: #fbbf24;
      font-weight: 800;
    }

    @media (max-width: 980px) {
      :root {
        --cell-h: 100px;
        --week-h: 40px;
      }

      .title {
        font-size: 26px;
      }

      .month-label {
        font-size: 20px;
      }

      .btn {
        min-height: 50px;
        font-size: 17px;
      }

      .weekdays {
        font-size: 16px;
      }

      .date {
        font-size: 18px;
      }

      .event-bar {
        font-size: 13px;
        height: 22px;
        line-height: 22px;
        padding: 0 8px;
      }
    }

    @media (max-width: 768px) {
      :root {
        --cell-h: 76px;
        --week-h: 34px;
      }

      .app {
        padding: 0 8px 16px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .title {
        font-size: 22px;
      }

      .controls {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .month-label {
        grid-column: 1 / -1;
        order: -1;
        font-size: 20px;
        padding: 8px 6px;
        min-width: 0;
        background: #101a28;
        border: 1px solid var(--line);
        border-radius: 12px;
      }

      .btn {
        width: 100%;
        min-height: 46px;
        font-size: 16px;
        padding: 0 10px;
      }

      .weekdays {
        font-size: 14px;
      }

      .cell {
        padding: 4px 4px;
      }

      .date {
        font-size: 14px;
      }

      .event-bar {
        height: 16px;
        line-height: 16px;
        font-size: 10px;
        padding: 0 6px;
      }

      .legend,
      .info {
        font-size: 14px;
      }

      .chip {
        font-size: 12px;
        padding: 4px 8px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">CM回歸號排程表</div>
      <div class="controls">
        <button class="btn" id="prevBtn">◀ 上月</button>
        <div class="month-label" id="monthLabel"></div>
        <button class="btn" id="nextBtn">下月 ▶</button>
        <button class="btn" id="todayBtn">今天</button>
        <button class="btn" id="modeBtn">方案：經典輪值</button>
        <button class="btn" id="renameBtn">帳號名稱設定</button>
      </div>
    </div>

    <div class="calendar-wrap">
      <div class="weekdays">
        <div class="sun">日</div>
        <div>一</div>
        <div>二</div>
        <div>三</div>
        <div>四</div>
        <div>五</div>
        <div>六</div>
      </div>
      <div class="grid" id="grid"></div>
      <div class="event-layer" id="eventLayer"></div>
    </div>
    <div class="legend" id="accountLegend"></div>
    <div class="info" id="statusBox"></div>
  </div>

  <script>
    const DAY = 24 * 60 * 60 * 1000;
    const HOUR = 60 * 60 * 1000;

    const fmtYMD = d => new Date(d.getFullYear(), d.getMonth(), d.getDate());
    const addDays = (d, n) => new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
    const sameDate = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    const startOfWeekSun = d => addDays(fmtYMD(d), -fmtYMD(d).getDay());
    const firstDayOfMonth = (y, m) => new Date(y, m, 1);
    const lastDayOfMonth = (y, m) => new Date(y, m + 1, 0);
    const fmtDate = d => `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
    const fmtDateTime = d => `${fmtDate(d)} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    const fmtHM = d => `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    const atTime = (d, h = 0, min = 0, sec = 0, ms = 0) => new Date(d.getFullYear(), d.getMonth(), d.getDate(), h, min, sec, ms);

    function getMonthGridRange(y, m) {
      const first = firstDayOfMonth(y, m), last = lastDayOfMonth(y, m);
      const start = startOfWeekSun(first);
      const end = addDays(startOfWeekSun(addDays(last, 6 - last.getDay())), 6);
      return { start, end };
    }

    function formatGap(fromDate, toDate) {
      const diff = toDate.getTime() - fromDate.getTime();
      if (diff < 0) return "0天0小時";
      const days = Math.floor(diff / DAY);
      const hours = Math.floor((diff % DAY) / HOUR);
      return `${days}天${hours}小時`;
    }

    const A = ["A1", "A2", "A3", "A4", "A5"];
    const B = ["B1", "B2", "B3", "B4", "B5"];
    const C = ["C1"];
    const ALL = [...A, ...B, ...C];
    const AB_POOL = [...A, ...B];

    const ACCOUNT_COLORS = {
      A1: "#22c55e", A2: "#06b6d4", A3: "#3b82f6", A4: "#8b5cf6", A5: "#ec4899",
      B1: "#f59e0b", B2: "#ef4444", B3: "#84cc16", B4: "#14b8a6", B5: "#f97316",
      C1: "#c026d3"
    };

    const SPECIAL_ACCOUNTS = new Set(["C1"]);

    const COOL_DAYS = 30;
    const MON_ENTER_H = 21, MON_ENTER_M = 0;
    const THU_ENTER_H = 19, THU_ENTER_M = 55;
    const BRIDGE_ENTER_H = 12, BRIDGE_ENTER_M = 0;
    const LEAVE_H = 20, LEAVE_M = 55;

    const MODE_CLASSIC = "classic";   // 經典輪值
    const MODE_TWIN_THU = "twinThu";  // 雙星週四（不使用C1）
    let scheduleMode = MODE_CLASSIC;

    const NAME_STORAGE_KEY = "cm-account-names-v1";
    let accountDisplayNames = loadAccountNames();

    const selectedAccounts = new Set();

    function loadAccountNames() {
      try {
        const raw = localStorage.getItem(NAME_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        const result = {};
        ALL.forEach(acc => {
          const name = (parsed && typeof parsed[acc] === "string") ? parsed[acc].trim() : "";
          result[acc] = name || acc;
        });
        return result;
      } catch {
        const fallback = {};
        ALL.forEach(acc => fallback[acc] = acc);
        return fallback;
      }
    }

    function saveAccountNames() {
      try {
        localStorage.setItem(NAME_STORAGE_KEY, JSON.stringify(accountDisplayNames));
      } catch (e) {
        alert("名稱儲存失敗（瀏覽器可能關閉了儲存權限）");
      }
    }

    function getDisplayName(acc) {
      return accountDisplayNames[acc] || acc;
    }

    function setDisplayName(acc, name) {
      const cleaned = (name || "").trim();
      accountDisplayNames[acc] = cleaned || acc;
      saveAccountNames();
    }

    function resetAllNames() {
      ALL.forEach(acc => accountDisplayNames[acc] = acc);
      saveAccountNames();
    }

    function openBulkRenameDialog() {
      const lines = ALL.map(acc => `${acc}=${getDisplayName(acc)}`).join('\n');
      const input = prompt(
        `請用每行「代號=名稱」編輯（空白會回復代號）
例如：
A1=主力一號
B3=備援三號
C1=橋接號

目前內容：`, lines);

      if (input === null) return;

      const next = { ...accountDisplayNames };
      const map = new Map(ALL.map(acc => [acc, acc]));

      input.split('\n').forEach(line => {
        const s = line.trim();
        if (!s) return;
        const idx = s.indexOf('=');
        if (idx < 0) return;
        const key = s.slice(0, idx).trim().toUpperCase();
        const val = s.slice(idx + 1).trim();
        if (map.has(key)) next[key] = val || key;
      });

      accountDisplayNames = next;
      saveAccountNames();
      rebuildMasterEvents();
      renderLegend();
      render();
    }

    function renameSingleAccount(acc) {
      const oldName = getDisplayName(acc);
      const input = prompt(`請輸入 ${acc} 的顯示名稱：`, oldName);
      if (input === null) return;
      setDisplayName(acc, input);
      rebuildMasterEvents();
      renderLegend();
      render();
    }

    function nextMondayFrom(dateOnly) {
      const d = fmtYMD(dateOnly);
      const dow = d.getDay();
      const add = dow === 1 ? 7 : (8 - dow);
      return addDays(d, add);
    }

    function generateSchedules(windowStart, windowEnd, mode = MODE_CLASSIC) {
      const planStart = addDays(windowStart, -120);
      const planEnd = addDays(windowEnd, 120);

      const state = {};
      ALL.forEach(acc => {
        state[acc] = {
          nextAvailableAt: new Date(planStart.getFullYear() - 5, 0, 1, 0, 0, 0, 0),
          used: 0,
          lastLeaveAt: null
        };
      });

      const events = [];
      const canUseAtDateTime = (acc, enterAt) => enterAt.getTime() >= state[acc].nextAvailableAt.getTime();

      function pickAccount(enterAt, pool = ALL, banSet = null) {
        const cands = pool.filter(acc => {
          if (!canUseAtDateTime(acc, enterAt)) return false;
          if (banSet && banSet.has(acc)) return false;
          return true;
        });
        if (!cands.length) return null;

        cands.sort((x, y) => {
          if (state[x].used !== state[y].used) return state[x].used - state[y].used;
          return state[x].nextAvailableAt - state[y].nextAvailableAt;
        });
        return cands[0];
      }

      function addEventWithTimes(acc, enterAt, leaveAt, label) {
        const startDate = fmtYMD(enterAt);
        const endDateEx = addDays(fmtYMD(leaveAt), 1);

        const prevLeave = state[acc].lastLeaveAt;
        const gapText = prevLeave ? `距上次離開 ${formatGap(prevLeave, enterAt)}` : "首回歸";

        const accName = getDisplayName(acc);
        const barText = `${accName}｜進 ${fmtHM(enterAt)}｜離 ${fmtHM(leaveAt)}｜${gapText}`;

        events.push({
          id: `${acc}-${enterAt.toISOString()}-${label || ''}`,
          account: acc,
          accountName: accName,
          title: barText,
          start: startDate,
          end: endDateEx,
          enterAt,
          leaveAt,
          gapText,
          label
        });

        state[acc].lastLeaveAt = leaveAt;
        state[acc].nextAvailableAt = new Date(leaveAt.getTime() + COOL_DAYS * DAY);
        state[acc].used++;
      }

      const isCoveredDate = (d) => events.some(ev => ev.start <= d && d < ev.end);

      let wk = startOfWeekSun(planStart);
      while (wk <= planEnd) {
        const weekStart = wk;
        const weekEndEx = addDays(wk, 7);

        const monDate = addDays(wk, 1);
        const thuDate = addDays(wk, 4);

        if (mode === MODE_CLASSIC) {
          const monEnterAt = atTime(monDate, MON_ENTER_H, MON_ENTER_M, 0, 0);
          const monAcc = pickAccount(monEnterAt, AB_POOL);
          if (monAcc) {
            const monLeaveAt = atTime(nextMondayFrom(monDate), LEAVE_H, LEAVE_M, 0, 0);
            addEventWithTimes(monAcc, monEnterAt, monLeaveAt, "MON");
          }

          const thuEnterAt = atTime(thuDate, THU_ENTER_H, THU_ENTER_M, 0, 0);
          const thuAcc = pickAccount(thuEnterAt, AB_POOL);
          if (thuAcc) {
            const thuLeaveAt = atTime(nextMondayFrom(thuDate), LEAVE_H, LEAVE_M, 0, 0);
            addEventWithTimes(thuAcc, thuEnterAt, thuLeaveAt, "THU");
          }

          let firstHole = null;
          for (let d = new Date(weekStart); d < weekEndEx; d = addDays(d, 1)) {
            if (!isCoveredDate(d)) {
              firstHole = fmtYMD(d);
              break;
            }
          }

          if (firstHole) {
            const bridgeEnterAt = atTime(firstHole, BRIDGE_ENTER_H, BRIDGE_ENTER_M, 0, 0);
            const bridgeAcc = pickAccount(bridgeEnterAt, C);
            if (bridgeAcc) {
              const bridgeLeaveAt = atTime(addDays(firstHole, 6), LEAVE_H, LEAVE_M, 0, 0);
              addEventWithTimes(bridgeAcc, bridgeEnterAt, bridgeLeaveAt, "BRIDGE");
            }
          }
        } else if (mode === MODE_TWIN_THU) {
          const enterAt = atTime(thuDate, THU_ENTER_H, THU_ENTER_M, 0, 0);
          const banned = new Set();

          const acc1 = pickAccount(enterAt, AB_POOL, banned);
          if (acc1) {
            const leaveAt1 = atTime(nextMondayFrom(thuDate), LEAVE_H, LEAVE_M, 0, 0);
            addEventWithTimes(acc1, enterAt, leaveAt1, "THU#1");
            banned.add(acc1);
          }

          const acc2 = pickAccount(enterAt, AB_POOL, banned);
          if (acc2) {
            const leaveAt2 = atTime(nextMondayFrom(thuDate), LEAVE_H, LEAVE_M, 0, 0);
            addEventWithTimes(acc2, enterAt, leaveAt2, "THU#2");
          }
        }

        wk = addDays(wk, 7);
      }

      return events.filter(ev => ev.end > addDays(windowStart, -40) && ev.start < addDays(windowEnd, 40));
    }

    const gridEl = document.getElementById('grid');
    const eventLayer = document.getElementById('eventLayer');
    const monthLabel = document.getElementById('monthLabel');
    const statusBox = document.getElementById('statusBox');
    const legendEl = document.getElementById('accountLegend');
    const modeBtn = document.getElementById('modeBtn');
    const renameBtn = document.getElementById('renameBtn');

    const today = fmtYMD(new Date());
    let view = new Date(today.getFullYear(), today.getMonth(), 1);

    let masterEvents = [];
    let masterRange = null;

    function getModeLabel(mode) {
      return mode === MODE_TWIN_THU ? "雙星週四" : "經典輪值";
    }

    function updateModeBtnText() {
      modeBtn.textContent = `方案：${getModeLabel(scheduleMode)}`;
    }

    function ensureMasterEvents(centerDate = today) {
      const y = centerDate.getFullYear();
      const start = new Date(y - 1, 0, 1);
      const end = new Date(y + 1, 11, 31);

      if (!masterRange || start < masterRange.start || end > masterRange.end || masterEvents.length === 0 || masterRange.mode !== scheduleMode) {
        masterEvents = generateSchedules(start, end, scheduleMode);
        masterRange = { start, end, mode: scheduleMode };
      }
    }

    function rebuildMasterEvents() {
      masterEvents = [];
      masterRange = null;
      ensureMasterEvents(view);
    }

    function isAccountVisible(acc) {
      return selectedAccounts.size === 0 || selectedAccounts.has(acc);
    }

    function toggleAccount(acc) {
      if (selectedAccounts.has(acc)) selectedAccounts.delete(acc);
      else selectedAccounts.add(acc);
      renderLegend();
      render();
    }

    function renderLegend() {
      const legendAccounts = (scheduleMode === MODE_TWIN_THU) ? AB_POOL : ALL;

      if (scheduleMode === MODE_TWIN_THU && selectedAccounts.has("C1")) {
        selectedAccounts.delete("C1");
      }

      legendEl.innerHTML = legendAccounts.map(acc => {
        const active = selectedAccounts.size === 0 || selectedAccounts.has(acc);
        const cls = `chip ${active ? 'active' : 'inactive'}`;
        const displayName = getDisplayName(acc);

        if (SPECIAL_ACCOUNTS.has(acc)) {
          return `
            <button type="button" class="${cls}" data-acc="${acc}" title="點擊切換篩選；雙擊可改名">
              <i class="dot" style="background: linear-gradient(90deg, #fbbf24 0%, #fb7185 48%, #c026d3 100%); box-shadow: 0 0 0 1px rgba(255,255,255,.55);"></i>
              <span class="name">${displayName}</span>
            </button>`;
        }

        return `
          <button type="button" class="${cls}" data-acc="${acc}" title="點擊切換篩選；雙擊可改名">
            <i class="dot" style="background:${ACCOUNT_COLORS[acc]}"></i>
            <span class="name">${displayName}</span>
          </button>`;
      }).join('');

      legendEl.querySelectorAll('[data-acc]').forEach(btn => {
        btn.addEventListener('click', () => toggleAccount(btn.dataset.acc));
        btn.addEventListener('dblclick', (e) => {
          e.preventDefault();
          e.stopPropagation();
          renameSingleAccount(btn.dataset.acc);
        });
      });
    }

    function countHoles(events, start, end) {
      let holes = 0;
      for (let d = new Date(start); d <= end; d = addDays(d, 1)) {
        const covered = events.some(ev => ev.start <= d && d < ev.end);
        if (!covered) holes++;
      }
      return holes;
    }

    function render() {
      const y = view.getFullYear(), m = view.getMonth();
      const { start, end } = getMonthGridRange(y, m);
      monthLabel.textContent = `${y} 年 ${m + 1} 月`;

      const days = [];
      for (let d = new Date(start); d <= end; d = addDays(d, 1)) days.push(new Date(d));

      const rows = Math.ceil(days.length / 7);
      gridEl.style.gridTemplateRows = `repeat(${rows}, var(--cell-h))`;
      gridEl.innerHTML = '';
      eventLayer.innerHTML = '';
      eventLayer.style.height = `calc(${rows} * var(--cell-h))`;
      eventLayer.style.top = `calc(var(--week-h) + 1px)`;

      days.forEach(d => {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (d.getMonth() !== m) cell.classList.add('other');
        if (d.getDay() === 0) cell.classList.add('sun');
        if (sameDate(d, today)) cell.classList.add('today');

        const date = document.createElement('div');
        date.className = 'date';
        date.textContent = d.getDate();
        cell.appendChild(date);
        gridEl.appendChild(cell);
      });

      ensureMasterEvents(view);

      const monthEventsAll = masterEvents.filter(ev => ev.end > start && ev.start < addDays(end, 1));
      const events = monthEventsAll.filter(ev => isAccountVisible(ev.account));

      const segments = [];
      events.forEach(ev => {
        let segStart = fmtYMD(ev.start);
        const evEnd = fmtYMD(ev.end);
        while (segStart < evEnd) {
          const ws = startOfWeekSun(segStart);
          const we = addDays(ws, 7);
          const segEnd = evEnd < we ? evEnd : we;
          segments.push({ ...ev, start: segStart, end: segEnd });
          segStart = segEnd;
        }
      });

      const vis = segments.filter(s => s.end > start && s.start < addDays(end, 1));
      vis.sort((a, b) => a.start - b.start || a.end - b.end);

      const lanesByRow = new Map();
      const rowH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'));
      const isMobile = window.innerWidth <= 768;
      const barH = isMobile ? 16 : 26;
      const gapY = isMobile ? 2 : 4;
      const topOffset = isMobile ? 18 : 34;

      for (const seg of vis) {
        const s = seg.start < start ? start : seg.start;
        const e = seg.end > addDays(end, 1) ? addDays(end, 1) : seg.end;

        const startIdx = Math.floor((s - start) / DAY);
        const endIdxEx = Math.floor((e - start) / DAY);

        const row = Math.floor(startIdx / 7);
        const colStart = startIdx % 7;

        const endOnMonday = e.getDay() === 1;
        const colEnd = endOnMonday ? (endIdxEx % 7) : ((endIdxEx - 1) % 7);

        const span = colEnd - colStart + 1;
        if (span <= 0) continue;

        if (!lanesByRow.has(row)) lanesByRow.set(row, []);
        const lanes = lanesByRow.get(row);
        let lane = 0;
        while (lane < lanes.length && lanes[lane] >= colStart) lane++;
        lanes[lane] = colEnd;

        const bar = document.createElement('div');
        bar.className = 'event-bar';
        bar.textContent = seg.title;

        if (SPECIAL_ACCOUNTS.has(seg.account)) bar.classList.add('c1-special');
        else bar.style.background = ACCOUNT_COLORS[seg.account] || "#22c55e";

        const cellW = gridEl.clientWidth / 7;
        bar.style.left = `${colStart * cellW + 2}px`;
        bar.style.width = `${span * cellW - 4}px`;
        bar.style.top = `${row * rowH + topOffset + lane * (barH + gapY)}px`;
        bar.title = `${seg.accountName}（${seg.account}）｜進:${fmtDateTime(seg.enterAt)}｜離:${fmtDateTime(seg.leaveAt)}｜${seg.gapText}`;

        eventLayer.appendChild(bar);
      }

      const holes = countHoles(events, start, end);
      const filterText = selectedAccounts.size === 0
        ? ((scheduleMode === MODE_TWIN_THU) ? "全部 A/B 帳號" : "全部帳號")
        : Array.from(selectedAccounts).sort().map(acc => `${getDisplayName(acc)}(${acc})`).join(", ");

      const hardRuleText = scheduleMode === MODE_TWIN_THU
        ? "每週兩個主號：皆為週四 19:55 進入；皆於下週一 20:55 離開（不使用 C1）"
        : "週一型進入=週一 21:00；週四型進入=週四 19:55；離開=下週一 20:55（含 C1 補洞）";

      statusBox.innerHTML = `
        <div><b>目前方案：</b>${getModeLabel(scheduleMode)}</div>
        <div><b>目前顯示帳號：</b>${filterText}</div>
        <div><b>硬規則：</b>${hardRuleText}</div>
        <div><b>冷卻規則：</b>從「實際離開時間」起算 ${COOL_DAYS} 天，滿期後才能再入場</div>
        <div><b>名稱提示：</b>圖例可<span class="ok">雙擊改名</span>，或按「帳號名稱設定」批次修改（會自動保存）</div>
        <div><b>本月覆蓋檢查（依目前篩選）：</b>${holes === 0 ? `<span class="ok">0 天空窗 ✅</span>` : `<span class="warn">${holes} 天空窗</span>`}</div>
      `;
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      view = new Date(view.getFullYear(), view.getMonth() - 1, 1);
      render();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      view = new Date(view.getFullYear(), view.getMonth() + 1, 1);
      render();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      view = new Date(today.getFullYear(), today.getMonth(), 1);
      render();
    });

    modeBtn.addEventListener('click', () => {
      scheduleMode = (scheduleMode === MODE_CLASSIC) ? MODE_TWIN_THU : MODE_CLASSIC;
      updateModeBtnText();
      rebuildMasterEvents();
      renderLegend();
      render();
    });

    renameBtn.addEventListener('click', () => {
      openBulkRenameDialog();
    });

    window.addEventListener('resize', render);

    updateModeBtnText();
    renderLegend();
    ensureMasterEvents(view);
    render();
  </script>
</body>

</html>
